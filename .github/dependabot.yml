# .github/dependabot.yml

# .github/dependabot.yml

version: 2

updates:
  # =========================
  # Bun Dependencies (via npm ecosystem)
  # =========================
  - package-ecosystem: "npm"
    directory: "/"              # or "/client" if package.json is inside a subfolder
    target-branch: "main"       # always open PRs against main
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10

    groups:
      # One PR for all patch updates (bun)
      patch-updates:
        update-types:
          - "patch"
        patterns:
          - "*"

      # One PR for all minor updates (bun)
      minor-updates:
        update-types:
          - "minor"
        patterns:
          - "*"

    allow:
      - dependency-type: "all"

    labels:
      - "dependencies"
      - "bun"

    commit-message:
      prefix: "chore"
      include: "scope"


  # =========================
  # GitHub Actions
  # =========================
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"       # always open PRs against main
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    groups:
      # One PR for all patch updates (actions)
      patch-updates:
        update-types:
          - "patch"
        patterns:
          - "*"

      # One PR for all minor updates (actions)
      minor-updates:
        update-types:
          - "minor"
        patterns:
          - "*"

    labels:
      - "dependencies"
      - "github-actions"

    commit-message:
      prefix: "ci"


  # =========================
  # Docker
  # =========================
  - package-ecosystem: "docker"
    directories:
      - "/"
    target-branch: "main"       # always open PRs against main
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    groups:
      # One PR for all patch updates (docker)
      patch-updates:
        update-types:
          - "patch"
        patterns:
          - "*"

      # One PR for all minor updates (docker)
      minor-updates:
        update-types:
          - "minor"
        patterns:
          - "*"

    labels:
      - "dependencies"
      - "docker"

    commit-message:
      prefix: "build"
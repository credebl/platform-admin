# .github/dependabot.yml

version: 2

updates:
  # =========================
  # Bun Dependencies (via npm ecosystem)
  # =========================
  - package-ecosystem: "npm"
    directory: "/"              # or "/client" if package.json is inside a subfolder
    target-branch: "main"       # always open PRs against main
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10

    groups:
      minor-updates:
        patterns:
          - "*"
        update-types:
          - "minor"

    allow:
      - dependency-type: "all"

    labels:
      - "dependencies"
      - "bun"                   # label for Bun dependencies

    commit-message:
      prefix: "chore"
      include: "scope"

  # =========================
  # GitHub Actions
  # =========================
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"       # always open PRs against main
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    labels:
      - "dependencies"
      - "github-actions"

    commit-message:
      prefix: "ci"

    groups:
      minor-updates:
        patterns:
          - "*"
        update-types:
          - "minor"

  # =========================
  # Docker
  # =========================
  - package-ecosystem: "docker"
    directories:
      - "/"
    target-branch: "main"       # always open PRs against main
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    labels:
      - "dependencies"
      - "docker"

    commit-message:
      prefix: "build"

    groups:
      minor-updates:
        patterns:
          - "*"
        update-types:
          - "minor"